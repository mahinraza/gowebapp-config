apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gowebapp-project
  namespace: argocd
spec:
  description: Project for gowebapp workloads
  
  # Allow resources from this Git repo
  sourceRepos:
    - https://github.com/mahinraza/gowebapp-config.git
  
  # Allow deployments to these namespaces
  destinations:
    - namespace: gowebapp
      server: https://kubernetes.default.svc
    - namespace: database
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc  # Added for ESO
  
  # Allow cluster-scoped resources (minimal)
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  
  # Allow namespace-scoped resources your app needs
  namespaceResourceWhitelist:
    # Core resources
    - group: ""
      kind: Pod
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: PersistentVolumeClaim
    
    # Apps resources
    - group: apps
      kind: Deployment
    - group: apps
      kind: ReplicaSet
    - group: apps
      kind: StatefulSet
    
    # Batch resources
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    
    # External Secrets Operator
    - group: external-secrets.io
      kind: ExternalSecret
    - group: external-secrets.io
      kind: SecretStore
    - group: external-secrets.io
      kind: ClusterSecretStore  # If using cluster-scoped
    
    # Networking
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: networking.k8s.io
      kind: Ingress
    
    # Autoscaling
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    
    # RBAC (namespace-scoped only)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
  
  # Block dangerous cluster-scoped resources
  clusterResourceBlacklist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      
  # Roles remain the same
  roles:
    - name: dev-readonly
      description: Read-only access for developers
      policies:
        - p, proj:gowebapp-project:dev-readonly, applications, get, gowebapp-project/*, allow
      groups:
        - gowebapp-devs
    
    - name: platform-admin
      description: Full control for platform team
      policies:
        - p, proj:gowebapp-project:platform-admin, applications, *, gowebapp-project/*, allow
      groups:
        - platform-team