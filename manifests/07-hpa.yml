apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gowebapp-hpa
  namespace: gowebapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gowebapp
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70