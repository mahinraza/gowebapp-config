# =============================================================================
# ConfigMap — application config.json (non-sensitive fields only)
#
# The DB password and session key are injected at runtime from the Secret
# via an init container that writes the final config.json to an emptyDir.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gowebapp-config
  namespace: gowebapp
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  # Template — placeholders are replaced by the init container
  config.json.tmpl: |
    {
      "Database": {
        "Type": "MySQL",
        "Bolt": {
          "Path": "gowebapp.db"
        },
        "MongoDB": {
          "URL": "127.0.0.1",
          "Database": "gowebapp"
        },
        "MySQL": {
          "Username": "__DB_USERNAME__",
          "Password": "__MYSQL_APP_PASSWORD__",
          "Name": "__DB_NAME__",
          "Hostname": "__DB_ENDPOINT__",
          "Port": __DB_PORT__,
          "Parameter": "?parseTime=true"
        }
      },
      "Email": {
        "Username": "",
        "Password": "",
        "Hostname": "",
        "Port": 25,
        "From": ""
      },
      "Recaptcha": {
        "Enabled": false,
        "Secret": "",
        "SiteKey": ""
      },
      "Server": {
        "Hostname": "",
        "UseHTTP": true,
        "UseHTTPS": false,
        "HTTPPort": 8080,
        "HTTPSPort": 443,
        "CertFile": "tls/server.crt",
        "KeyFile": "tls/server.key"
      },
      "Session": {
        "SecretKey": "__SESSION_SECRET_KEY__",
        "Name": "gosess",
        "Options": {
          "Path": "/",
          "Domain": "",
          "MaxAge": 28800,
          "Secure": false,
          "HttpOnly": true
        }
      },
      "Template": {
        "Root": "base",
        "Children": [
          "partial/menu",
          "partial/footer"
        ]
      },
      "View": {
        "BaseURI": "/",
        "Extension": "tmpl",
        "Folder": "template",
        "Name": "blank",
        "Caching": true
      }
    }
