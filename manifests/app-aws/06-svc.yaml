# =============================================================================
# Service — exposes the app externally
# Change type to NodePort for local clusters (minikube, kind)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gowebapp-service
  namespace: gowebapp
  labels:
    app: gowebapp 
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: gowebapp
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: LoadBalancer
  # For NodePort (local testing), replace the above type with:
  # type: NodePort
  # and add:
  # nodePort: 30080