# =============================================================================
# GoWebApp — Deployment + LoadBalancer Service
#
# An initContainer writes the final config.json to a shared emptyDir by:
#   1. Taking the template from the ConfigMap
#   2. sed-replacing __MYSQL_APP_PASSWORD__ and __SESSION_SECRET_KEY__
#      with values from the Secret
#   3. Writing the result to /app/config/config.json
#
# The main container mounts that same emptyDir, so it always reads the
# real config — no secrets are ever stored in a ConfigMap.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gowebapp
  namespace: gowebapp
  labels:
    app: gowebapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gowebapp
  # Rolling update — ensures zero downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gowebapp
    spec:
      # Pod-level security context to ensure consistent UID
      securityContext:
        fsGroup: 1001  # Ensures volumes have correct group ownership
        runAsUser: 1001
        runAsGroup: 1001
      # ------------------------------------------------------------------
      # Init container — builds the final config.json from template + secrets
      # ------------------------------------------------------------------
      initContainers:
        - name: prepare-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed \
                -e "s/__MYSQL_APP_PASSWORD__/${MYSQL_APP_PASSWORD}/g" \
                -e "s/__SESSION_SECRET_KEY__/${SESSION_SECRET_KEY}/g" \
                /config-template/config.json.tmpl > /config-out/config.json
              echo "config.json written:"
              cat /config-out/config.json
              # Ensure proper ownership
              chown 1001:1001 /config-out/config.json
              chmod 644 /config-out/config.json
          env:
            - name: MYSQL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gowebapp-secrets
                  key: mysql-app-password
                  optional: false
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gowebapp-secrets
                  key: session-secret-key
                  optional: false
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config-out
              mountPath: /config-out
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

      # ------------------------------------------------------------------
      # Main application container
      # ------------------------------------------------------------------
      containers:
        - name: gowebapp
          image: mahinraza556/gowebapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          securityContext:
            capabilities:
              drop: ["ALL"]
              add:
                - NET_BIND_SERVICE
            runAsUser: 1001  # This is appuser (non-root)
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            # Final rendered config.json
            - name: config-out
              mountPath: /app/config
              readOnly: true
          env:
            - name: APP_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

      volumes:
        - name: config-template
          configMap:
            name: gowebapp-config
            items:
            - key: config.json.tmpl
              path: config.json.tmpl
            defaultMode: 0644
        - name: config-out
          emptyDir: {}

---
# =============================================================================
# Service — exposes the app externally
# Change type to NodePort for local clusters (minikube, kind)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gowebapp-service
  namespace: gowebapp
  labels:
    app: gowebapp
spec:
  selector:
    app: gowebapp
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: LoadBalancer
  # For NodePort (local testing), replace the above type with:
  # type: NodePort
  # and add:
  # nodePort: 30080