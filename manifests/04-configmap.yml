# =============================================================================
# ConfigMap — application config.json (non-sensitive fields only)
#
# The DB password and session key are injected at runtime from the Secret
# via an init container that writes the final config.json to an emptyDir.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gowebapp-config
  namespace: gowebapp
data:
  # Template — placeholders are replaced by the init container
  config.json.tmpl: |
    {
      "Database": {
        "Type": "MySQL",
        "Bolt": {
          "Path": "gowebapp.db"
        },
        "MongoDB": {
          "URL": "127.0.0.1",
          "Database": "gowebapp"
        },
        "MySQL": {
          "Username": "gowebapp",
          "Password": "__MYSQL_APP_PASSWORD__",
          "Name": "gowebapp",
          "Hostname": "mysql-service",
          "Port": 3306,
          "Parameter": "?parseTime=true"
        }
      },
      "Email": {
        "Username": "",
        "Password": "",
        "Hostname": "",
        "Port": 25,
        "From": ""
      },
      "Recaptcha": {
        "Enabled": false,
        "Secret": "",
        "SiteKey": ""
      },
      "Server": {
        "Hostname": "",
        "UseHTTP": true,
        "UseHTTPS": false,
        "HTTPPort": 80,
        "HTTPSPort": 443,
        "CertFile": "tls/server.crt",
        "KeyFile": "tls/server.key"
      },
      "Session": {
        "SecretKey": "__SESSION_SECRET_KEY__",
        "Name": "gosess",
        "Options": {
          "Path": "/",
          "Domain": "",
          "MaxAge": 28800,
          "Secure": false,
          "HttpOnly": true
        }
      },
      "Template": {
        "Root": "base",
        "Children": [
          "partial/menu",
          "partial/footer"
        ]
      },
      "View": {
        "BaseURI": "/",
        "Extension": "tmpl",
        "Folder": "template",
        "Name": "blank",
        "Caching": true
      }
    }

---
# =============================================================================
# ConfigMap — MySQL initialisation SQL
# Mounted into the MySQL pod; runs automatically on first start.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: gowebapp
data:
  init.sql: |
    -- -------------------------------------------------------------------------
    -- Initialise the gowebapp schema
    -- -------------------------------------------------------------------------
    SET NAMES utf8 COLLATE 'utf8_unicode_ci';
    SET foreign_key_checks = 1;
    SET time_zone = '+00:00';
    SET sql_mode = 'NO_AUTO_VALUE_ON_ZERO';
    SET default_storage_engine = InnoDB;
    SET CHARACTER SET utf8;

    CREATE DATABASE IF NOT EXISTS gowebapp
      DEFAULT CHARSET = utf8
      COLLATE = utf8_unicode_ci;

    USE gowebapp;

    CREATE TABLE IF NOT EXISTS user_status (
        id         TINYINT(1) UNSIGNED NOT NULL AUTO_INCREMENT,
        status     VARCHAR(25) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        deleted    TINYINT(1) UNSIGNED NOT NULL DEFAULT 0,
        PRIMARY KEY (id)
    );

    CREATE TABLE IF NOT EXISTS user (
        id         INT(10) UNSIGNED NOT NULL AUTO_INCREMENT,
        first_name VARCHAR(50) NOT NULL,
        last_name  VARCHAR(50) NOT NULL,
        email      VARCHAR(100) NOT NULL,
        password   CHAR(60) NOT NULL,
        status_id  TINYINT(1) UNSIGNED NOT NULL DEFAULT 1,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        deleted    TINYINT(1) UNSIGNED NOT NULL DEFAULT 0,
        UNIQUE KEY (email),
        CONSTRAINT f_user_status
          FOREIGN KEY (status_id) REFERENCES user_status (id)
          ON DELETE CASCADE ON UPDATE CASCADE,
        PRIMARY KEY (id)
    );

    INSERT IGNORE INTO user_status (id, status, created_at, updated_at, deleted) VALUES
      (1, 'active',   CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 0),
      (2, 'inactive', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 0);

    CREATE TABLE IF NOT EXISTS note (
        id         INT(10) UNSIGNED NOT NULL AUTO_INCREMENT,
        content    TEXT NOT NULL,
        user_id    INT(10) UNSIGNED NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        deleted    TINYINT(1) UNSIGNED NOT NULL DEFAULT 0,
        CONSTRAINT f_note_user
          FOREIGN KEY (user_id) REFERENCES user (id)
          ON DELETE CASCADE ON UPDATE CASCADE,
        PRIMARY KEY (id)
    );

    -- Create a dedicated app user (least-privilege — no root in production)
    CREATE USER IF NOT EXISTS 'gowebapp'@'%' IDENTIFIED BY '__MYSQL_APP_PASSWORD__';
    GRANT SELECT, INSERT, UPDATE, DELETE ON gowebapp.* TO 'gowebapp'@'%';
    FLUSH PRIVILEGES;