apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gowebapp-project
  namespace: argocd
spec:
  description: Project for gowebapp workloads
  
  # Allow resources from both Git repo AND Helm repo
  sourceRepos:
    - https://github.com/mahinraza/gowebapp-config.git
    - https://mahinraza.github.io/helm-charts/
  
  # Allow deployments to these namespaces
  destinations:
    - namespace: gowebapp
      server: https://kubernetes.default.svc
    # - namespace: database
    #   server: https://kubernetes.default.svc
    # - namespace: external-secrets
    #   server: https://kubernetes.default.svc
  
  # Allow cluster-scoped resources
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # - group: "argoproj.io"
    #   kind: Application
    - group: external-secrets.io
      kind: ClusterSecretStore
  
  # Allow namespace-scoped resources
  namespaceResourceWhitelist:
    # Core resources
    - group: ""
      kind: Pod
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    # - group: ""
    #   kind: PersistentVolumeClaim
    # - group: ""
    #   kind: ServiceAccount
    
    # Apps resources
    - group: apps
      kind: Deployment
    - group: apps
      kind: ReplicaSet
    # - group: apps
    #   kind: StatefulSet
    # - group: apps
    #   kind: DaemonSet
    
    # Batch resources
    - group: batch
      kind: Job
    # - group: batch
    #   kind: CronJob
    
    # External Secrets Operator
    - group: external-secrets.io
      kind: ExternalSecret
    # - group: external-secrets.io
    #   kind: SecretStore
    
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    # - group: networking.k8s.io
    #   kind: NetworkPolicy
    
    # Autoscaling
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    
    # Cert Manager
    - group: cert-manager.io
      kind: Certificate
    - group: cert-manager.io
      kind: Issuer
    
    # # RBAC
    # - group: rbac.authorization.k8s.io
    #   kind: Role
    # - group: rbac.authorization.k8s.io
    #   kind: RoleBinding
  
  # Block dangerous cluster-scoped resources
  clusterResourceBlacklist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    # - group: "*"
    #   kind: "*"  # Block everything not explicitly whitelisted
  
  # Roles
  roles:
    - name: dev-readonly
      description: Read-only access for developers
      policies:
        - p, proj:gowebapp-project:dev-readonly, applications, get, gowebapp-project/*, allow
      groups:
        - gowebapp-devs
    
    - name: platform-admin
      description: Full control for platform team
      policies:
        - p, proj:gowebapp-project:platform-admin, applications, *, gowebapp-project/*, allow
      groups:
        - platform-team