# =============================================================================
# GoWebApp — Deployment + LoadBalancer Service
#
# An initContainer writes the final config.json to a shared emptyDir by:
#   1. Taking the template from the ConfigMap
#   2. sed-replacing __MYSQL_APP_PASSWORD__ and __SESSION_SECRET_KEY__
#      with values from the Secret
#   3. Writing the result to /app/config/config.json
#
# The main container mounts that same emptyDir, so it always reads the
# real config — no secrets are ever stored in a ConfigMap.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gowebapp
  namespace: gowebapp
  labels:
    app: gowebapp
    tier: backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gowebapp
      tier: backend
  # Rolling update — ensures zero downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gowebapp
        tier: backend
    spec:
      # Pod-level security context to ensure consistent UID
      securityContext:
        fsGroup: 1001  # Ensures volumes have correct group ownership
        runAsUser: 1001
        runAsGroup: 1001
      # ------------------------------------------------------------------
      # Init container — builds the final config.json from template + secrets
      # ------------------------------------------------------------------
      initContainers:
        - name: prepare-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed \
                -e "s/__MYSQL_APP_PASSWORD__/$(cat /db-app-credentials/password)/g" \
                -e "s/__SESSION_SECRET_KEY__/$(cat /db-app-credentials/session-secret-key)/g" \
                -e "s/__DB_USERNAME__/$(cat /db-app-credentials/username)/g" \
                -e "s/__DB_NAME__/$(cat /db-app-credentials/database)/g" \
                -e "s/__DB_ENDPOINT__/$(cat /db-endpoint/host)/g" \
                -e "s/__DB_PORT__/$(cat /db-endpoint/port)/g" \
                /config-template/config.json.tmpl > /config-out/config.json
              echo "config.json written:"
              cat /config-out/config.json
              # Ensure proper ownership
              chown 1001:1001 /config-out/config.json
              chmod 644 /config-out/config.json
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config-out
              mountPath: /config-out
            - name: db-app-credentials
              mountPath: /db-app-credentials
              readOnly: true
            - name: db-endpoint
              mountPath: /db-endpoint
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

        - name: mysql-client
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for database to be ready..."
              # Read root credentials from mounted secrets
              ROOT_USER=$(cat /db-app-credentials/username)
              ROOT_PASS=$(cat /db-app-credentials/password)
              DB_HOST=$(cat /db-endpoint/host)
              DB_PORT=$(cat /db-endpoint/port)
              # Read app credentials
              APP_USER=$(cat /db-app-credentials/username)
              APP_PASS=$(cat /db-app-credentials/password)
              APP_DB=$(cat /db-app-credentials/database)
              # Wait for database to be reachable
              until mysql \
                -h "$DB_HOST" \
                -P "$DB_PORT" \
                -u "$ROOT_USER" \
                -p"$ROOT_PASS" \
                -e "SELECT 1" &>/dev/null; do
                echo "Waiting for database connection..."
                sleep 5
              done
              echo "✅ Connected to database"
          volumeMounts:
            - name: db-app-credentials
              mountPath: /db-app-credentials
              readOnly: true
            - name: db-endpoint
              mountPath: /db-endpoint
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

      # ------------------------------------------------------------------
      # Main application container
      # ------------------------------------------------------------------
      containers:
        - name: gowebapp
          image: mahinraza556/gowebapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            capabilities:
              drop: ["ALL"]
              add:
                - NET_BIND_SERVICE
            runAsUser: 1001  # This is appuser (non-root)
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            # Final rendered config.json
            - name: config-out
              mountPath: /app/config
              readOnly: true
          env:
            - name: APP_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

      volumes:
        - name: config-template
          configMap:
            name: gowebapp-config
            items:
            - key: config.json.tmpl
              path: config.json.tmpl
            defaultMode: 0644
        - name: config-out
          emptyDir: {}
        - name:  db-app-credentials
          secret:
            secretName: db-app-credentials
            items:
              - key: username
                path: username
              - key: password
                path: password
              - key: database
                path: database
              - key: session_secret_key
                path: session-secret-key
            defaultMode: 0644
        - name: db-endpoint
          secret:
            secretName: db-endpoint
            items:
              - key: host
                path: host
              - key: port
                path: port
            defaultMode: 0644

