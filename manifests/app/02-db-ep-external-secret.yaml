apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-endpoint
  namespace: gowebapp
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-gowebapp-store
    kind: ClusterSecretStore
  target:
    name: db-endpoint
    creationPolicy: Owner
  data:
  - secretKey: host
    remoteRef:
      key: prod/do/database/mysql/endpoint
      property: host
  - secretKey: port
    remoteRef:
      key: prod/do/database/mysql/endpoint
      property: port